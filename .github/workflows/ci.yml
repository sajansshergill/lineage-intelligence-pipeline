name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java for PySpark
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: |
          python -m py_compile \
            dashboard/app.py \
            dashboard/pages/ai_advisor.py \
            dashboard/pages/dq_violations.py \
            dashboard/pages/lineage_explorer.py \
            dashboard/pages/run_history.py \
            etl/framework.py \
            etl/lineage_tracker.py \
            etl/error_handler.py \
            etl/transforms/clean.py \
            etl/transforms/enrich.py \
            etl/transforms/aggregate.py \
            etl/transforms/load.py \
            graph/lineage_graph.py \
            graph/queries.py \
            graph/stardog_client.py \
            jobs/job_executor.py

      - name: Run tests
        env:
          PYSPARK_PYTHON: python
          PYSPARK_DRIVER_PYTHON: python
        run: pytest -q

      - name: Smoke test Streamlit app import
        run: |
          python - <<'PY'
          import runpy
          runpy.run_path("dashboard/app.py", run_name="__main__")
          PY
